name: Publish Skills

on:
  push:
    branches:
      - master
    paths:
      - "skills/**"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout skills repository
        uses: actions/checkout@v4

      - name: Clone target website repository
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          TARGET_TOKEN: ${{ secrets.TARGET_TOKEN }}
        run: |
          git clone https://x-access-token:${TARGET_TOKEN}@github.com/${TARGET_REPO}.git target-repo

      - name: Copy skills and generate index
        run: |
          mkdir -p target-repo/public/skills

          # Copy entire skills directory structure
          cp -R skills/* target-repo/public/skills/

          # Generate index.txt listing all skill files
          cd skills
          find . -type f -name "*.md" | sed 's|^\./||' > ../target-repo/public/skills/index.txt

      - name: Commit and push if changes exist
        run: |
          cd target-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/skills

          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "Sync skills from skills repository"
            git push origin master
          fi