// Spotless Configuration
spotless {
    java {
        removeUnusedImports()
        googleJavaFormat()
                .reorderImports(true)
        trimTrailingWhitespace()
        endWithNewline()
        targetExclude("build/**")
    }

    tasks.named('build') {
        dependsOn 'spotlessApply'
    }
}

compileJava.dependsOn tasks.spotlessApply